<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parquímetro Centro</title>

    <link rel="stylesheet" href="style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header>
      <div class="logo">🚗 Parquímetro Centro</div>

      <nav>
        <a href="#">Início</a>
        <a href="#">Tarifas</a>
        <a href="#">Ajuda</a>
      </nav>
    </header>

    <main>
      <div class="card">
        <h1>Calcular permanência</h1>

        <p class="descricao">
          Digite o valor pago no parquímetro para verificar por quanto tempo o
          veículo pode ficar estacionado.
        </p>

        <label for="valor">Valor pago (R$)</label>

        <input type="number" id="valor" step="0.01" min="0" placeholder="Ex.: 2.50" />

        <button type="button" id="confirmar-pagamento">Calcular tempo</button>

        <div id="resultado" class="resultado" role="status" aria-live="polite"></div>
      </div>
    </main>

    <footer>Sistema de estacionamento urbano • Parquímetro Centro © 2026</footer>

    <script src="script.js"></script>
  </body>
</html>
